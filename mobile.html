<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>排品速查</title>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-card: #1a1a1a;
            --bg-secondary: #252525;
            --text-primary: #f5f5f5;
            --text-muted: #888;
            --border-color: #333;
            --primary-color: #4a90d9;
            --success-color: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* 选择页面 */
        .select-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .select-page h1 {
            font-size: 24px;
            margin-bottom: 40px;
        }

        .select-btn {
            width: 100%;
            max-width: 280px;
            padding: 20px;
            margin: 10px 0;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .select-btn:active {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        .select-btn .icon {
            font-size: 28px;
        }

        /* 列表页面 */
        .list-page {
            display: none;
            padding-bottom: 80px;
        }

        .list-page.active {
            display: block;
        }

        /* 顶部栏 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
        }

        .action-btn.primary {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        .action-btn:active {
            opacity: 0.8;
        }

        /* 内容区 */
        .content {
            padding-top: 60px;
            padding-bottom: 20px;
        }

        .card-list {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 商品卡片 */
        .product-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: stretch;
            border: 1px solid var(--border-color);
            height: 120px;
        }

        .card-image {
            width: 120px;
            height: 120px;
            object-fit: cover;
            flex-shrink: 0;
            cursor: pointer;
            background: #333;
        }

        .card-info {
            flex: 1;
            align-self: stretch;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
            box-sizing: border-box;
        }

        .card-header {
            display: flex;
            align-items: stretch;
            gap: 8px;
        }

        .sample-number {
            flex: 1;
            background: var(--primary-color);
            color: white;
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }

        .ranking-tag {
            flex: 1;
            background: #22c55e;
            color: white;
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }

        .product-name {
            font-size: 14px;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .product-name:active {
            color: var(--success-color);
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            flex: 1;
            text-align: center;
        }

        .meta-label {
            color: var(--primary-color);
            font-size: 11px;
        }

        .meta-value {
            font-size: 13px;
            color: var(--text-primary);
        }

        .product-code {
            cursor: pointer;
        }

        .product-code:active {
            color: var(--success-color);
        }

        /* 图片放大模态框 */
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .image-modal.active {
            display: flex;
        }

        .image-modal img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .image-modal.loading::before {
            content: '加载中...';
            color: #fff;
            font-size: 16px;
            position: absolute;
        }

        .image-modal.loading img {
            opacity: 0;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success-color);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 300;
        }

        .toast.show {
            opacity: 1;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
    </style>
</head>

<body>
    <!-- 列表页面 -->
    <div class="list-page active" id="listPage">
        <header class="header">
            <h1 id="pageTitle">📋 排品</h1>
            <div class="header-actions">
                <button class="action-btn primary" id="refreshBtn">🔄 刷新</button>
            </div>
        </header>
        <div class="content">
            <div id="cardList" class="card-list"></div>
        </div>
    </div>

    <!-- 图片放大模态框 -->
    <div class="image-modal" id="imageModal">
        <img id="modalImage" src="" alt="">
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            // Supabase 配置（与主站一致）
            const SUPABASE_URL = 'https://ugadhdhwixrejzfcwugj.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnYWRoZGh3aXhyZWp6ZmN3dWdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYyMzU3NTgsImV4cCI6MjA4MTgxMTc1OH0.XQp5pvoM-nSGfLZB9ZGfxJCkU3GbeiWrBohA_XchS54';

            const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            // 显示 Toast
            function showToast(msg) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            }

            // 复制文本
            window.copyText = async function (text, label) {
                try {
                    await navigator.clipboard.writeText(text);
                    const shortText = text.length > 15 ? text.substring(0, 15) + '...' : text;
                    showToast(`✅ 已复制${label || ''}: ${shortText}`);
                } catch {
                    showToast('❌ 复制失败');
                }
            };

            // 分类颜色映射
            function getRankingColor(result) {
                const colorMap = {
                    '1.库存多': '#22c55e',      // 绿色
                    '2.库存少': '#f59e0b',      // 橙色
                    '1.评分品A': '#8b5cf6',     // 紫色
                    '2.佩戴品': '#06b6d4',      // 青色
                    '3.周边品': '#ec4899',      // 粉色
                    '4.评分品B': '#4f416f',     // 深紫色
                    '5.库存品': '#6366f1',      // 靛青色
                    '新品': '#f59e0b',          // 橙色
                    '福利品': '#ec4899'         // 粉色
                };
                return colorMap[result] || '#6b7280';  // 默认灰色
            }

            // 渲染商品卡片
            function renderCard(item) {
                // 处理图片URL（可能有多个，取第一个）
                let imageUrl = item.image_url || '';
                if (imageUrl && imageUrl.includes(',')) {
                    imageUrl = imageUrl.split(',')[0].trim();
                }
                const safeName = (item.product_name || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const safeCode = (item.product_code || '').replace(/'/g, "\\'");
                const rankingColor = getRankingColor(item.ranking_result);

                return `
                    <div class="product-card">
                        <img class="card-image" src="${imageUrl}" alt="" data-url="${imageUrl}" referrerpolicy="no-referrer" onerror="this.style.background='#333';this.alt='无图'">
                        <div class="card-info">
                            <div class="card-header">
                                <span class="sample-number">${item.sample_number || '--'}</span>
                                ${item.ranking_result ? `<span class="ranking-tag" style="background:${rankingColor}">${item.ranking_result}</span>` : ''}
                            </div>
                            <div class="product-name" data-name="${safeName}">
                                ${item.product_name || '未知商品'}
                            </div>
                            <div class="card-meta">
                                <div class="meta-item">
                                    <span class="meta-label">仓位</span>
                                    <span class="meta-value">${item.warehouse || '--'}</span>
                                </div>
                                <div class="meta-item">
                                    <span class="meta-label">样品仓</span>
                                    <span class="meta-value">${item.sample_warehouse || '--'}</span>
                                </div>
                                <div class="meta-item">
                                    <span class="meta-label">实际库存数</span>
                                    <span class="meta-value">${item.actual_stock ?? '--'}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            // 加载数据
            async function loadData() {
                const container = document.getElementById('cardList');
                container.innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';

                try {
                    const { data, error } = await supabaseClient
                        .from('mapping_history')
                        .select('*')
                        .order('sample_number', { ascending: true })
                        .limit(200);

                    if (error) throw error;

                    if (!data || data.length === 0) {
                        container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无数据</p></div>';
                        return;
                    }

                    container.innerHTML = data.map(renderCard).join('');
                    bindCardEvents(container);
                } catch (err) {
                    console.error('加载失败:', err);
                    container.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>网络错误，请点击重试</p><button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;font-size:14px;background:#4a90d9;color:#fff;border:none;border-radius:8px;cursor:pointer;">🔄 重试</button></div>';
                }
            }

            // 绑定卡片事件
            function bindCardEvents(container) {
                container.querySelectorAll('.card-image').forEach(img => {
                    img.addEventListener('click', function () {
                        const url = this.dataset.url || this.src;
                        if (url && !url.includes('无图')) {
                            showImage(url);
                        }
                    });
                });

                container.querySelectorAll('.product-name').forEach(el => {
                    el.addEventListener('click', function () {
                        copyText(this.dataset.name || this.textContent.trim(), '商品名称');
                    });
                });
            }

            // 显示大图
            function showImage(url) {
                const modal = document.getElementById('imageModal');
                const img = document.getElementById('modalImage');

                // 立即显示加载状态
                modal.classList.add('active', 'loading');
                img.src = '';

                // 加载图片
                img.onload = function () {
                    modal.classList.remove('loading');
                };
                img.onerror = function () {
                    modal.classList.remove('loading');
                };
                img.src = url;
            }

            // 关闭大图
            document.getElementById('imageModal').addEventListener('click', function () {
                this.classList.remove('active');
            });

            // 加载推送时保存的方案名称
            async function loadCurrentSchemeName() {
                try {
                    const { data, error } = await supabaseClient
                        .from('ranking_config')
                        .select('config_value')
                        .eq('config_key', 'pushed_scheme_name')
                        .single();
                    if (!error && data?.config_value?.name) {
                        return data.config_value.name;
                    }
                } catch (e) {
                    console.warn('加载方案名称失败:', e);
                }
                return '默认方案';
            }

            // 初始化：加载方案名称并加载数据
            async function init() {
                const schemeName = await loadCurrentSchemeName();
                document.getElementById('pageTitle').textContent = `📋 排品 · ${schemeName}`;
                showToast('图片加载缓慢，请不要关闭页面，等待加载。。。');
                loadData();
            }

            // 刷新按钮
            document.getElementById('refreshBtn').addEventListener('click', function () {
                loadData();
                showToast('刷新中...');
            });

            init();
        });
    </script>
</body>

</html>
