<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>排品速查</title>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-card: #1a1a1a;
            --bg-secondary: #252525;
            --text-primary: #f5f5f5;
            --text-muted: #888;
            --border-color: #333;
            --primary-color: #4a90d9;
            --success-color: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* 顶部栏 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .refresh-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .refresh-btn:active {
            opacity: 0.8;
        }

        /* 分页标签 */
        .tabs {
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            background: var(--bg-card);
            display: flex;
            border-bottom: 1px solid var(--border-color);
            z-index: 99;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            color: var(--text-muted);
            border: none;
            font-size: 14px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        /* 内容区 */
        .content {
            padding-top: 112px;
            padding-bottom: 20px;
        }

        .card-list {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 商品卡片 */
        .product-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            border: 1px solid var(--border-color);
        }

        .card-image {
            width: 100px;
            height: 100px;
            object-fit: cover;
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .card-info {
            flex: 1;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sample-number {
            background: var(--primary-color);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .product-name {
            font-size: 14px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            cursor: pointer;
        }

        .product-name:active {
            color: var(--success-color);
        }

        .card-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: auto;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
        }

        .meta-label {
            color: var(--primary-color);
            font-size: 11px;
        }

        .meta-value {
            font-size: 13px;
            color: var(--text-primary);
        }

        .product-code {
            cursor: pointer;
        }

        .product-code:active {
            color: var(--success-color);
        }

        /* 图片放大模态框 */
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .image-modal.active {
            display: flex;
        }

        .image-modal img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success-color);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 300;
        }

        .toast.show {
            opacity: 1;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
    </style>
</head>

<body>
    <!-- 顶部栏 -->
    <header class="header">
        <h1>📦 排品速查</h1>
        <button class="refresh-btn" id="refreshBtn">🔄 刷新</button>
    </header>

    <!-- 分页标签 -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="main">大号排品</button>
        <button class="tab-btn" data-tab="sub">小号排品</button>
    </div>

    <!-- 内容区 -->
    <div class="content">
        <div id="mainContent" class="card-list"></div>
        <div id="subContent" class="card-list" style="display: none;"></div>
    </div>

    <!-- 图片放大模态框 -->
    <div class="image-modal" id="imageModal">
        <img id="modalImage" src="" alt="">
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <!-- Supabase SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            // Supabase 配置
            const SUPABASE_URL = 'https://cqoepkdwxktxwirwaowz.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxb2Vwa2R3eGt0eHdpcndhb3d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzQwOTIzNzAsImV4cCI6MjA0OTY2ODM3MH0.z95wnnftK2aEEH7Lhkgr2BFGV5p-9H-vVjGzO9hxMvU';

            // 初始化 Supabase 客户端
            const { createClient } = supabase;
            const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

            // 当前选中的分页
            let currentTab = 'main';

            // 显示 Toast
            function showToast(msg) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            }

            // 复制文本
            window.copyText = async function (text) {
                try {
                    await navigator.clipboard.writeText(text);
                    showToast('已复制');
                } catch {
                    showToast('复制失败');
                }
            };

            // 渲染商品卡片
            function renderCard(item) {
                const imageUrl = item.image_url || '';
                const safeName = (item.product_name || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const safeCode = (item.product_code || '').replace(/'/g, "\\'");

                return `
                    <div class="product-card">
                        <img class="card-image" src="${imageUrl}" alt="" data-url="${imageUrl}" onerror="this.style.background='#333';this.alt='无图'">
                        <div class="card-info">
                            <div class="card-header">
                                <span class="sample-number">${item.sample_number || '--'}</span>
                            </div>
                            <div class="product-name" data-name="${safeName}">
                                ${item.product_name || '未知商品'}
                            </div>
                            <div class="card-meta">
                                <div class="meta-item">
                                    <span class="meta-label">仓位</span>
                                    <span class="meta-value">${item.warehouse || '--'}</span>
                                </div>
                                <div class="meta-item">
                                    <span class="meta-label">编码</span>
                                    <span class="meta-value product-code" data-code="${safeCode}">${item.product_code || '--'}</span>
                                </div>
                                <div class="meta-item">
                                    <span class="meta-label">库存</span>
                                    <span class="meta-value">${item.actual_stock ?? '--'}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            // 加载数据
            async function loadData(tab) {
                const container = document.getElementById(tab === 'main' ? 'mainContent' : 'subContent');
                const tableName = tab === 'main' ? 'ranking_results' : 'sub_ranking_results';

                container.innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';

                try {
                    const { data, error } = await supabaseClient
                        .from(tableName)
                        .select('*')
                        .order('sample_number', { ascending: true })
                        .limit(200);

                    if (error) throw error;

                    if (!data || data.length === 0) {
                        container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无数据</p></div>';
                        return;
                    }

                    container.innerHTML = data.map(renderCard).join('');
                    bindCardEvents(container);
                } catch (err) {
                    console.error('加载失败:', err);
                    container.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>加载失败: ' + err.message + '</p></div>';
                }
            }

            // 绑定卡片事件
            function bindCardEvents(container) {
                // 图片点击
                container.querySelectorAll('.card-image').forEach(img => {
                    img.addEventListener('click', function () {
                        const url = this.dataset.url || this.src;
                        if (url && !url.includes('无图')) {
                            showImage(url);
                        }
                    });
                });

                // 商品名称点击复制
                container.querySelectorAll('.product-name').forEach(el => {
                    el.addEventListener('click', function () {
                        copyText(this.dataset.name || this.textContent.trim());
                    });
                });

                // 商品编码点击复制
                container.querySelectorAll('.product-code').forEach(el => {
                    el.addEventListener('click', function () {
                        copyText(this.dataset.code || this.textContent.trim());
                    });
                });
            }

            // 显示大图
            function showImage(url) {
                const modal = document.getElementById('imageModal');
                const img = document.getElementById('modalImage');
                img.src = url;
                modal.classList.add('active');
            }

            // 关闭大图
            document.getElementById('imageModal').addEventListener('click', function () {
                this.classList.remove('active');
            });

            // 分页切换
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');

                    currentTab = this.dataset.tab;

                    document.getElementById('mainContent').style.display = currentTab === 'main' ? 'flex' : 'none';
                    document.getElementById('subContent').style.display = currentTab === 'sub' ? 'flex' : 'none';

                    // 如果该分页还没加载过数据，则加载
                    const container = document.getElementById(currentTab === 'main' ? 'mainContent' : 'subContent');
                    if (!container.querySelector('.product-card')) {
                        loadData(currentTab);
                    }
                });
            });

            // 刷新按钮
            document.getElementById('refreshBtn').addEventListener('click', function () {
                loadData(currentTab);
                showToast('刷新中...');
            });

            // 初始加载
            loadData('main');
        });
    </script>
</body>

</html>
